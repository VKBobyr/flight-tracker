<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fareless</title>
    <!-- link-preview-meta -->
    <!-- default-link-preview-meta-start -->
    <meta name="description" content="Build flexible trips and find Google Flights fares across date windows.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Fareless">
    <meta property="og:description" content="Build flexible trips and find Google Flights fares across date windows.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Fareless">
    <meta name="twitter:description" content="Build flexible trips and find Google Flights fares across date windows.">
    <!-- default-link-preview-meta-end -->
    <link rel="stylesheet" href="styles.css?v=2026-06-03-trip-filters">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <img src="assets/flight-tracker-logo.png" alt="">
          </div>
          <div class="brand-copy">
            <h1 aria-label="Fareless"><span class="brand-wordmark-strong">Fare</span><span class="brand-wordmark-light">less</span></h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="share-button toolbar-button" id="shareMonitorsButton" type="button" hidden>
            <span aria-hidden="true">↗</span>
            <span class="share-button-copy">Share</span>
          </button>
          <button class="ghost-button toolbar-button" id="runAllButton" type="button" hidden>Find fares</button>
        </div>
      </header>

      <main class="workspace hero-dashboard">
        <section class="monitors-section" aria-labelledby="monitorsTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Trips</p>
              <h2 id="monitorsTitle">Trips</h2>
            </div>
            <div class="section-actions">
              <span class="status-pill last-run-pill" id="lastSweepAt" hidden>Not run yet</span>
              <button class="ghost-button section-button" id="openCreateMonitorButton" type="button">Create trip</button>
            </div>
          </div>
          <div class="sweep-progress" id="sweepProgress" hidden>
            <div class="sweep-progress-copy">
              <strong id="sweepProgressTitle">Finding fares</strong>
              <span id="sweepProgressText">Preparing searches</span>
            </div>
            <div class="sweep-progress-track" aria-hidden="true">
              <div id="sweepProgressBar"></div>
            </div>
          </div>
          <div class="monitor-grid" id="monitorGrid"></div>
        </section>
      </main>

      <div class="modal-overlay" id="createMonitorOverlay" aria-hidden="true" hidden>
        <section class="builder-panel modal-panel" aria-labelledby="builderTitle" role="dialog" aria-modal="true">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="builderEyebrow">Create trip</p>
              <h2 id="builderTitle">Route and dates</h2>
            </div>
            <button class="icon-button modal-close" id="closeCreateMonitorButton" type="button" aria-label="Close create trip">×</button>
          </div>

          <form id="monitorForm" autocomplete="off">
            <section class="form-section" aria-label="Route">
              <div class="form-section-heading">
                <h3>Route</h3>
                <span id="pairCount">0 pairs added</span>
              </div>
              <div class="airport-grid">
                <label class="field airport-field search-field">
                  <span>From</span>
                  <input id="originInput" type="text" placeholder="Airport, city, or code" aria-describedby="originSelected" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="search">
                  <input id="originCode" type="hidden">
                  <small id="originSelected">No airport selected</small>
                  <div class="suggestions" id="originSuggestions" role="listbox"></div>
                </label>

                <label class="field airport-field search-field">
                  <span>To</span>
                  <input id="destinationInput" type="text" placeholder="Airport, city, or code" aria-describedby="destinationSelected" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="search">
                  <input id="destinationCode" type="hidden">
                  <small id="destinationSelected">No airport selected</small>
                  <div class="suggestions" id="destinationSuggestions" role="listbox"></div>
                </label>

                <button class="icon-button pair-add-button" id="addPairButton" type="button" aria-label="Add airport pair">
                  <span aria-hidden="true">+</span>
                </button>
              </div>
              <div class="pair-list" id="pairList" aria-live="polite"></div>
            </section>

            <section class="form-section" aria-label="Trip window">
              <div class="form-section-heading">
                <h3>Trip window</h3>
              </div>
              <div class="form-grid date-grid">
                <label class="field">
                  <span>Earliest start</span>
                  <input id="startFrom" type="date" required>
                </label>
                <label class="field">
                  <span>Latest end</span>
                  <input id="startTo" type="date" required>
                </label>
              </div>

              <fieldset class="trip-length-panel">
                <legend>Trip length</legend>
                <div class="segmented-control trip-length-mode" aria-label="Trip length mode">
                  <label>
                    <input type="radio" name="tripLengthMode" value="any">
                    <span>Any</span>
                  </label>
                  <label>
                    <input type="radio" name="tripLengthMode" value="exact">
                    <span>Exact</span>
                  </label>
                  <label>
                    <input type="radio" name="tripLengthMode" value="range" checked>
                    <span>Range</span>
                  </label>
                </div>
                <div class="trip-rule">
                  <div class="stepper compact-stepper">
                    <button class="stepper-button" type="button" data-step-target="tripMin" data-step="-1" aria-label="Decrease minimum trip length">−</button>
                    <input id="tripMin" type="number" min="0" value="4" required aria-label="Minimum days">
                    <button class="stepper-button" type="button" data-step-target="tripMin" data-step="1" aria-label="Increase minimum trip length">+</button>
                  </div>
                  <span>to</span>
                  <div class="stepper compact-stepper">
                    <button class="stepper-button" type="button" data-step-target="tripMax" data-step="-1" aria-label="Decrease maximum trip length">−</button>
                    <input id="tripMax" type="number" min="0" value="10" required aria-label="Maximum days">
                    <button class="stepper-button" type="button" data-step-target="tripMax" data-step="1" aria-label="Increase maximum trip length">+</button>
                  </div>
                  <span>days</span>
                  <button class="max-length-button" id="maxTripLengthButton" type="button">Max</button>
                </div>
                <p class="trip-any-note">Fareless will check every possible trip length inside the date window.</p>
              </fieldset>

              <label class="field">
                <span>Max stops</span>
                <select id="maxStops" required>
                  <option value="0" selected>Nonstop only</option>
                  <option value="1">1 stop or fewer</option>
                  <option value="2">2 stops or fewer</option>
                  <option value="ANY">Any number of stops</option>
                </select>
              </label>
            </section>

            <section class="form-section" aria-label="Airline filters">
              <div class="form-section-heading">
                <h3>Airlines</h3>
                <span id="airlineCount">0 selected</span>
              </div>
              <div class="segmented-control airline-mode" aria-label="Airline filter mode">
                <label>
                  <input type="radio" name="airlineMode" value="exclude" checked>
                  <span>Exclude</span>
                </label>
                <label>
                  <input type="radio" name="airlineMode" value="include">
                  <span>Only these</span>
                </label>
              </div>
              <div class="airline-filter">
                <label class="field airline-field search-field">
                  <span id="airlineFieldLabel">Exclude airlines</span>
                  <input id="airlineInput" type="text" placeholder="Airline or code" aria-describedby="airlineSelected" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="search">
                  <input id="airlineCode" type="hidden">
                  <small id="airlineSelected">No airline selected</small>
                  <div class="suggestions" id="airlineSuggestions" role="listbox"></div>
                </label>
                <button class="tertiary-button" id="addAirlineButton" type="button">
                  <span aria-hidden="true">+</span>
                  Add airline
                </button>
              </div>
              <div class="pair-list" id="airlineList" aria-live="polite"></div>
            </section>

            <div class="form-actions action-row">
              <button class="primary-button" id="monitorSubmitButton" type="submit">Add trip</button>
              <button class="ghost-button" id="resetButton" type="reset">Clear</button>
            </div>
          </form>
        </section>
      </div>

    </div>

    <script src="travel-windows.js?v=2026-06-02-window-tests-2"></script>
    <script src="app.js?v=2026-06-03-trip-filters"></script>
  </body>
</html>
